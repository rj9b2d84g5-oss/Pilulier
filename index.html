<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Pilulier</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Georgia',serif;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:1.5rem 1rem;
  transition:background-color 1s ease;
  background-color:#F2E8D9;
}
body.alert{background-color:#F0C4A0}

.container{width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;gap:1.6rem}

header{text-align:center}
.title{font-size:1.4rem;color:#5C3D28;font-weight:400;letter-spacing:.06em}
.date{font-size:.78rem;color:#9A7460;margin-top:4px;font-family:sans-serif}

.pillbox{
  width:100%;
  background:linear-gradient(160deg,#D9C9B0 0%,#C8B59A 100%);
  border-radius:22px;
  padding:16px 12px;
  display:flex;
  flex-direction:column;
  gap:10px;
  box-shadow:0 8px 24px rgba(80,50,20,.22),inset 0 1px 2px rgba(255,255,255,.35);
}

/* Row of 3 */
.row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
/* Last row: 1 item centered */
.row.last{
  display:flex;
  justify-content:center;
}
.row.last .slot{
  width:calc(33.333% - 7px);
}

.slot{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}

.day-tag{
  font-family:sans-serif;font-size:.65rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.06em;
  color:#7A5A42;
}

.box-wrap{
  width:100%;aspect-ratio:1/1.1;
  position:relative;
  perspective:300px;
}

.tray{
  position:absolute;inset:0;
  border-radius:10px;
  background:linear-gradient(170deg,#E8D9C2 0%,#D4C0A0 100%);
  box-shadow:
    0 4px 10px rgba(80,50,20,.25),
    inset 0 -3px 6px rgba(80,50,20,.18),
    inset 0 2px 4px rgba(255,255,255,.4);
  display:flex;align-items:center;justify-content:center;
}

.cavity{
  width:72%;height:55%;
  border-radius:8px;
  background:linear-gradient(145deg,#B8A48A,#C8B49A);
  box-shadow:inset 0 3px 8px rgba(60,35,10,.35);
  display:flex;align-items:center;justify-content:center;
}
.cavity.empty{
  background:linear-gradient(145deg,#A89070,#B8A080);
  box-shadow:inset 0 4px 10px rgba(40,20,5,.42);
}

.pill{
  width:62%;height:52%;
  border-radius:50%;
  position:relative;display:flex;overflow:hidden;
  transition:transform .12s;
}
.pill:hover{transform:scale(1.12)}
.pill-l{flex:1;background:linear-gradient(135deg,#E8826A,#C24E38)}
.pill-r{flex:1;background:linear-gradient(135deg,#F5EDE0,#D8C8B0)}
.pill::after{
  content:'';position:absolute;top:18%;left:12%;
  width:40%;height:28%;
  background:rgba(255,255,255,.32);
  border-radius:50%;transform:rotate(-25deg);
}
.pill.pop-out{animation:popOut .38s ease forwards}
.pill.pop-in {animation:popIn  .42s ease forwards}
@keyframes popOut{
  0%  {transform:scale(1);opacity:1}
  45% {transform:scale(1.35) rotate(-10deg);opacity:1}
  80% {transform:scale(.5) rotate(15deg);opacity:.4}
  100%{transform:scale(0);opacity:0}
}
@keyframes popIn{
  0%  {transform:scale(0) rotate(-20deg);opacity:0}
  55% {transform:scale(1.18) rotate(6deg);opacity:.9}
  78% {transform:scale(.95) rotate(-3deg);opacity:1}
  100%{transform:scale(1) rotate(0);opacity:1}
}

.lid{
  position:absolute;inset:0;
  border-radius:10px;
  transform-origin:top center;
  transform-style:preserve-3d;
  transform:rotateX(0deg);
  transition:transform .55s cubic-bezier(.4,0,.2,1),box-shadow .55s ease;
  will-change:transform;
  z-index:10;
  background:linear-gradient(175deg,rgba(240,225,205,.92) 0%,rgba(210,190,165,.88) 60%,rgba(185,165,140,.85) 100%);
  box-shadow:
    0 6px 14px rgba(80,50,20,.28),
    0 2px 4px rgba(80,50,20,.18),
    inset 0 1px 3px rgba(255,255,255,.55),
    inset 0 -1px 2px rgba(80,50,20,.15);
}
.lid-label{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:sans-serif;font-size:.6rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;
  color:#7A5A42;pointer-events:none;
}
.lid::before{
  content:'';
  position:absolute;bottom:18%;left:50%;
  transform:translateX(-50%);
  width:38%;height:4px;
  border-radius:2px;
  background:rgba(255,255,255,.45);
}

.slot.open .lid{
  transform:rotateX(-165deg);
  box-shadow:0 2px 6px rgba(80,50,20,.15),inset 0 1px 3px rgba(255,255,255,.4);
}

.slot.today .tray{
  box-shadow:
    0 0 0 2.5px #C8724A,
    0 4px 10px rgba(80,50,20,.25),
    inset 0 -3px 6px rgba(80,50,20,.18),
    inset 0 2px 4px rgba(255,255,255,.4);
}
body.alert .slot.today .tray{
  box-shadow:
    0 0 0 2.5px #F5EFE6,
    0 4px 10px rgba(80,50,20,.25),
    inset 0 -3px 6px rgba(80,50,20,.18),
    inset 0 2px 4px rgba(255,255,255,.4);
}

.message-area{
  text-align:center;padding:.85rem 1.4rem;
  background:rgba(245,239,230,.55);
  border-radius:16px;max-width:340px;
  transition:background .8s ease;
}
body.alert .message-area{background:rgba(255,245,235,.25)}
.msg-emoji{font-size:1.3rem;margin-bottom:5px}
.msg-text{font-size:.88rem;color:#5C3D28;line-height:1.55;font-style:italic;transition:color .8s}
body.alert .msg-text{color:#5C3D28}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="title">Mon Pilulier</div>
    <div class="date" id="dateDisplay"></div>
  </header>
  <div class="pillbox" id="pillbox"></div>
  <div class="message-area">
    <div class="msg-emoji" id="emojiMsg">🌿</div>
    <div class="msg-text" id="messageText">Chargement…</div>
  </div>
</div>

<script>
const DAYS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const KEY='pillbox_v4';
const MSG_OK=['Bravo ! Tu prends soin de toi, et c\'est magnifique.','Ta pilule du jour est prise. Continue comme ça !','Belle journée en perspective. Ton corps te remercie.','Tout est en ordre. Prends soin de toi aujourd\'hui.'];
const MSG_ALERT=['N\'oublie pas ta pilule d\'aujourd\'hui, elle t\'attend !','Hey toi ! Un petit geste pour ta santé, ça ne prend qu\'une seconde.','Ta pilule du jour est encore là. Pense à la prendre !'];
const EMO_OK=['🌿','🌸','✨','💛','🌼'];
const EMO_ALERT=['🔔','⏰','💊','🌻'];

function pick(a){return a[Math.floor(Math.random()*a.length)]}
function getState(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return{}}
function setState(s){try{localStorage.setItem(KEY,JSON.stringify(s));}catch(e){}}
function todayIdx(){const d=new Date().getDay();return d===0?6:d-1}
function formatDate(){return new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}

function updateAlert(){
  const s=getState(),ti=todayIdx();
  const taken=s[ti]&&s[ti].taken;
  document.body.classList.toggle('alert',!taken);
  document.getElementById('emojiMsg').textContent=taken?pick(EMO_OK):pick(EMO_ALERT);
  document.getElementById('messageText').textContent=taken?pick(MSG_OK):pick(MSG_ALERT);
}

function buildSlot(i,st,ti){
  const slot=document.createElement('div');
  slot.className='slot'+(i===ti?' today':'')+(st.open?' open':'');
  slot.dataset.idx=i;

  slot.innerHTML=`
    <div class="day-tag">${DAYS[i]}</div>
    <div class="box-wrap">
      <div class="tray">
        <div class="cavity${st.taken?' empty':''}">
          ${(st.open&&!st.taken)?`<div class="pill" data-pill="${i}"><div class="pill-l"></div><div class="pill-r"></div></div>`:''}
        </div>
      </div>
      <div class="lid"><div class="lid-label">${DAYS[i]}</div></div>
    </div>
  `;

  slot.querySelector('.lid').addEventListener('click',e=>{
    e.stopPropagation();
    const s=getState();
    const cur=s[i]||{open:false,taken:false};
    if(!cur.open){
      cur.open=true;s[i]=cur;setState(s);
      slot.classList.add('open');
      if(!cur.taken){
        const cav=slot.querySelector('.cavity');
        const p=document.createElement('div');
        p.className='pill';p.dataset.pill=i;
        p.innerHTML='<div class="pill-l"></div><div class="pill-r"></div>';
        p.addEventListener('click',pillClick);
        cav.appendChild(p);
      }
    } else {
      cur.open=false;s[i]=cur;setState(s);
      slot.classList.remove('open');
      const p=slot.querySelector('.pill');if(p)p.remove();
    }
    updateAlert();
  });

  const pillEl=slot.querySelector('.pill');
  if(pillEl) pillEl.addEventListener('click',pillClick);
  return slot;
}

function render(){
  const state=getState(),ti=todayIdx();
  const box=document.getElementById('pillbox');
  box.innerHTML='';
  document.getElementById('dateDisplay').textContent=formatDate();

  // Row 1: Lun–Mer (0,1,2), Row 2: Jeu–Sam (3,4,5), Row 3: Dim (6) centered
  [[0,1,2],[3,4,5],[6]].forEach((group,ri)=>{
    const row=document.createElement('div');
    row.className='row'+(ri===2?' last':'');
    group.forEach(i=>row.appendChild(buildSlot(i,state[i]||{open:false,taken:false},ti)));
    box.appendChild(row);
  });

  updateAlert();
}

function pillClick(e){
  e.stopPropagation();
  const i=parseInt(e.currentTarget.dataset.pill);
  const s=getState();
  const cur=s[i]||{open:false,taken:false};
  if(cur.taken)return;
  const pill=document.querySelector(`.pill[data-pill="${i}"]`);
  if(!pill)return;
  pill.classList.add('pop-out');
  pill.addEventListener('animationend',()=>{
    cur.taken=true;s[i]=cur;setState(s);
    const cav=pill.closest('.cavity');
    if(cav){pill.remove();cav.classList.add('empty');}
    updateAlert();
  },{once:true});
}

render();
</script>
</body>
</html>
