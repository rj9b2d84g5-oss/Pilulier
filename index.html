<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,viewport-fit=cover">
<title>Mon Pilulier</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#EADFF6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pilulier">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Comic Sans MS','Chalkboard SE','Marker Felt',cursive;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:calc(1.5rem + env(safe-area-inset-top)) 1rem calc(1.5rem + env(safe-area-inset-bottom));
  transition:background-color 1s ease;
  background-color:#EADFF6;
}
body.alert{background-color:#F6DCE8}

.container{width:100%;max-width:440px;display:flex;flex-direction:column;align-items:center;gap:1.4rem}

header{text-align:center}
.title{
  font-size:1.6rem;color:#5A3A1E;font-weight:700;letter-spacing:.02em;
  text-shadow:1px 1px 0 rgba(255,255,255,.6);
}
.date{font-size:.8rem;color:#8A6A88;margin-top:4px}

.pillbox{
  width:100%;
  padding:6px 4px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  justify-items:center;
}
.row.last{
  display:flex;
  justify-content:center;
}
.row.last .slot{
  width:calc(33.333% - 7px);
}

.slot{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  width:100%;
}

.day-tag{
  font-size:.8rem;font-weight:700;
  color:#5A3A1E;
  letter-spacing:.02em;
}

.jar-wrap{
  width:100%;aspect-ratio:1/1.2;
  position:relative;
  transition:transform .2s;
}
.slot:active .jar-wrap{transform:scale(.96)}

.jar-svg{width:100%;height:100%;display:block;overflow:visible}

.heart{
  transition:transform .18s ease, opacity .2s;
  transform-origin:center;
  transform-box:fill-box;
}
.slot:hover .heart{transform:scale(1.08)}

.lid{
  transform-origin:50% 92%;
  transform-box:fill-box;
  transition:transform .55s cubic-bezier(.5,-.3,.3,1.3);
}
.slot.open .lid{
  transform:translateY(-8%) rotate(-28deg);
}

.heart.pop-out{animation:popOut .45s ease forwards}
@keyframes popOut{
  0%  {transform:scale(1) rotate(0);opacity:1}
  35% {transform:scale(1.45) rotate(-15deg);opacity:1}
  70% {transform:scale(.6)  rotate(18deg);opacity:.5}
  100%{transform:scale(0)   rotate(30deg);opacity:0}
}

.slot.today .jar-body{
  filter:drop-shadow(0 0 6px rgba(190,120,170,.65));
}

.message-area{
  text-align:center;padding:.85rem 1.4rem;
  background:rgba(255,255,255,.5);
  border-radius:22px;max-width:340px;
  border:2px solid rgba(90,58,30,.18);
  transition:background .8s ease;
}
body.alert .message-area{background:rgba(255,240,248,.55)}
.msg-emoji{font-size:1.5rem;margin-bottom:4px}
.msg-text{
  font-size:.92rem;color:#5A3A1E;line-height:1.5;
  font-family:'Georgia',serif;font-style:italic;
}

.today-badge{
  position:absolute;top:-14px;right:-6px;
  font-size:1.1rem;
  animation:sparkle 1.6s ease-in-out infinite;
}
@keyframes sparkle{
  0%,100%{transform:scale(1) rotate(0);opacity:.9}
  50%    {transform:scale(1.2) rotate(15deg);opacity:1}
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="title">Mon Pilulier</div>
    <div class="date" id="dateDisplay"></div>
  </header>
  <div class="pillbox" id="pillbox"></div>
  <div class="message-area">
    <div class="msg-emoji" id="emojiMsg">🌸</div>
    <div class="msg-text" id="messageText">Chargement…</div>
  </div>
</div>

<template id="jarTpl">
<svg class="jar-svg" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Jar body -->
  <path class="jar-body"
        d="M22,44
           Q20,42 20,46
           L20,104
           Q20,112 28,114
           L72,114
           Q80,112 80,104
           L80,46
           Q80,42 78,44
           Z"
        fill="#FFFDF7" stroke="#5A3A1E" stroke-width="2.8" stroke-linejoin="round"/>
  <!-- Hearts inside (decoration, always visible faintly when taken) -->
  <g class="hearts-group"></g>
  <!-- Main heart (the 'pill') -->
  <path class="heart main-heart"
        d="M50,92
           C42,82 30,80 30,70
           C30,63 36,59 42,60
           C46,61 49,64 50,68
           C51,64 54,61 58,60
           C64,59 70,63 70,70
           C70,80 58,82 50,92 Z"
        fill="#F28FB7" stroke="#5A3A1E" stroke-width="2.4" stroke-linejoin="round"/>
  <!-- Jar neck -->
  <path d="M30,44 L30,38 Q30,34 34,34 L66,34 Q70,34 70,38 L70,44 Z"
        fill="#FFFDF7" stroke="#5A3A1E" stroke-width="2.8" stroke-linejoin="round"/>
  <!-- Lid -->
  <g class="lid">
    <path d="M24,34
             Q22,18 30,14
             L70,14
             Q78,18 76,34 Z"
          fill="#F4B8CE" stroke="#5A3A1E" stroke-width="2.8" stroke-linejoin="round"/>
    <!-- lid lines -->
    <path d="M34,18 L34,30 M42,18 L42,30 M50,18 L50,30 M58,18 L58,30 M66,18 L66,30"
          stroke="#5A3A1E" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  </g>
</svg>
</template>

<script>
const DAYS=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const KEY='pillbox_v5';
const MSG_OK=['Bravo ! Tu prends soin de toi, et c\'est magnifique.','Ta pilule du jour est prise. Continue comme ça !','Belle journée en perspective. Ton corps te remercie.','Tout est en ordre. Prends soin de toi aujourd\'hui.'];
const MSG_ALERT=['N\'oublie pas ta pilule d\'aujourd\'hui, elle t\'attend !','Hey toi ! Un petit geste pour ta santé, ça ne prend qu\'une seconde.','Ta pilule du jour est encore là. Pense à la prendre !'];
const EMO_OK=['🌸','✨','💖','🌷','🦋'];
const EMO_ALERT=['🔔','💕','💊','🌼'];
// Small decorative hearts floating in the jar (position + fill variants)
const DECO=[
  {x:36,y:78,s:.35,c:'#FADCEB'},
  {x:64,y:80,s:.35,c:'#F4B8CE'},
  {x:40,y:104,s:.3,c:'#F4B8CE'},
  {x:60,y:104,s:.3,c:'#FADCEB'}
];

function pick(a){return a[Math.floor(Math.random()*a.length)]}
function getState(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return{}}
function setState(s){try{localStorage.setItem(KEY,JSON.stringify(s));}catch(e){}}
function todayIdx(){const d=new Date().getDay();return d===0?6:d-1}
function formatDate(){return new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}

function updateAlert(){
  const s=getState(),ti=todayIdx();
  const taken=s[ti]&&s[ti].taken;
  document.body.classList.toggle('alert',!taken);
  document.getElementById('emojiMsg').textContent=taken?pick(EMO_OK):pick(EMO_ALERT);
  document.getElementById('messageText').textContent=taken?pick(MSG_OK):pick(MSG_ALERT);
}

function heartPath(cx,cy,scale){
  // Heart centered at cx,cy with the given scale (base size ~12 wide)
  const s=scale;
  const x=cx,y=cy;
  return `M${x},${y+11*s}
          C${x-8*s},${y+1*s} ${x-20*s},${y-1*s} ${x-20*s},${y-11*s}
          C${x-20*s},${y-18*s} ${x-14*s},${y-22*s} ${x-8*s},${y-21*s}
          C${x-4*s},${y-20*s} ${x-1*s},${y-17*s} ${x},${y-13*s}
          C${x+1*s},${y-17*s} ${x+4*s},${y-20*s} ${x+8*s},${y-21*s}
          C${x+14*s},${y-22*s} ${x+20*s},${y-18*s} ${x+20*s},${y-11*s}
          C${x+20*s},${y-1*s} ${x+8*s},${y+1*s} ${x},${y+11*s} Z`;
}

function buildSlot(i,st,ti){
  const slot=document.createElement('div');
  slot.className='slot'+(i===ti?' today':'')+(st.open?' open':'');
  slot.dataset.idx=i;

  const tpl=document.getElementById('jarTpl').content.cloneNode(true);
  const wrap=document.createElement('div');
  wrap.className='jar-wrap';
  wrap.appendChild(tpl);

  // Decorative background hearts inside jar
  const g=wrap.querySelector('.hearts-group');
  DECO.forEach(d=>{
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',heartPath(d.x,d.y,d.s));
    p.setAttribute('fill',d.c);
    p.setAttribute('stroke','#5A3A1E');
    p.setAttribute('stroke-width','1.2');
    p.setAttribute('stroke-linejoin','round');
    p.setAttribute('opacity','.75');
    g.appendChild(p);
  });

  // Main heart
  const mainHeart=wrap.querySelector('.main-heart');
  if(st.taken) mainHeart.style.display='none';

  // Day label
  const dayTag=document.createElement('div');
  dayTag.className='day-tag';
  dayTag.textContent=DAYS[i];

  slot.appendChild(dayTag);
  slot.appendChild(wrap);

  if(i===ti){
    const badge=document.createElement('div');
    badge.className='today-badge';
    badge.textContent='✨';
    wrap.appendChild(badge);
  }

  // Lid click toggles open state
  const lid=wrap.querySelector('.lid');
  lid.addEventListener('click',e=>{
    e.stopPropagation();
    const s=getState();
    const cur=s[i]||{open:false,taken:false};
    cur.open=!cur.open;
    s[i]=cur;setState(s);
    slot.classList.toggle('open',cur.open);
    updateAlert();
  });

  // Heart click takes the pill (only when lid is open)
  mainHeart.addEventListener('click',e=>{
    e.stopPropagation();
    const s=getState();
    const cur=s[i]||{open:false,taken:false};
    if(!cur.open || cur.taken) return;
    mainHeart.classList.add('pop-out');
    mainHeart.addEventListener('animationend',()=>{
      cur.taken=true;s[i]=cur;setState(s);
      mainHeart.style.display='none';
      mainHeart.classList.remove('pop-out');
      updateAlert();
    },{once:true});
  });

  return slot;
}

function render(){
  const state=getState(),ti=todayIdx();
  const box=document.getElementById('pillbox');
  box.innerHTML='';
  document.getElementById('dateDisplay').textContent=formatDate();

  [[0,1,2],[3,4,5],[6]].forEach((group,ri)=>{
    const row=document.createElement('div');
    row.className='row'+(ri===2?' last':'');
    group.forEach(i=>row.appendChild(buildSlot(i,state[i]||{open:false,taken:false},ti)));
    box.appendChild(row);
  });

  updateAlert();
}

render();
</script>
</body>
</html>
